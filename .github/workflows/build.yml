name: Build YTLiteSkipSilence

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos
  THEOS_VENDOR_INCLUDES: ${{ github.workspace }}/theos/include/vendor

jobs:
  build:
    name: Build .deb (${{ matrix.scheme }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        scheme: [classic, rootless, roothide]
        include:
          - scheme: classic
            scheme_env: ""
          - scheme: rootless
            scheme_env: "ROOTLESS=1"
          - scheme: roothide
            scheme_env: "ROOTHIDE=1"
    steps:
      - name: Checkout tweak
        uses: actions/checkout@v4

      - name: Checkout Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: Install SDK (iPhoneOS16.5)
        run: |
          mkdir -p "$THEOS/sdks"
          # The theos/sdks repo ships SDKs as tar.xz assets under a tagged release.
          # The URL pattern is /releases/download/<tag>/<SDK>.tar.xz
          curl -L --fail \
            -o /tmp/iPhoneOS16.5.sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          tar -xf /tmp/iPhoneOS16.5.sdk.tar.xz -C "$THEOS/sdks"
          ls "$THEOS/sdks"

      - name: Checkout vendor headers (YouTubeHeader + PSHeader)
        run: |
          mkdir -p "$THEOS_VENDOR_INCLUDES"
          git clone --depth=1 https://github.com/PoomSmart/YouTubeHeader.git "$THEOS_VENDOR_INCLUDES/YouTubeHeader"
          git clone --depth=1 https://github.com/PoomSmart/PSHeader.git        "$THEOS_VENDOR_INCLUDES/PSHeader"
          # Make them findable both as <YouTubeHeader/...> and via -I../YouTubeHeader
          ln -sf "$THEOS_VENDOR_INCLUDES/YouTubeHeader" "$THEOS/include/YouTubeHeader"
          ln -sf "$THEOS_VENDOR_INCLUDES/PSHeader"        "$THEOS/include/PSHeader"

      - name: Build
        run: |
          make clean package FINALPACKAGE=1 ${{ matrix.scheme_env }}

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: YTLiteSkipSilence-${{ matrix.scheme }}-deb
          path: packages/*.deb
          if-no-files-found: warn

  release:
    name: Attach .deb to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect .debs
        run: |
          mkdir -p release
          find artifacts -name '*.deb' -exec cp {} release/ \;
          ls -la release/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.deb
