name: Build YTLiteSkipSilence

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos
  PACKAGE_VERSION: 1.0.0

jobs:
  build:
    name: Build .deb (rootless + roothide + classic)
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        scheme: [classic, rootless, roothide]
        include:
          - scheme: classic
            scheme_env: ""
          - scheme: rootless
            scheme_env: "ROOTLESS=1"
          - scheme: roothide
            scheme_env: "ROOTHIDE=1"
    steps:
      - name: Checkout tweak
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: Checkout vendor headers (YouTubeHeader + PSHeader)
        run: |
          git clone --depth=1 https://github.com/PoomSmart/YouTubeHeader.git "$THEOS/include/vendor/YouTubeHeader"
          git clone --depth=1 https://github.com/PoomSmart/PSHeader.git        "$THEOS/include/vendor/PSHeader"
          ln -s "$THEOS/include/vendor/YouTubeHeader" "$THEOS/include/YouTubeHeader"
          ln -s "$THEOS/include/vendor/PSHeader"        "$THEOS/include/PSHeader"

      - name: Checkout YTVideoOverlay (build-time dep)
        run: |
          git clone --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git ../YTVideoOverlay
          # Make YTVideoOverlay's headers + Init.x findable during build
          ln -s "$PWD/../YTVideoOverlay" "$THEOS/include/YTVideoOverlay"

      - name: Install SDK
        run: |
          # Theos expects an iPhoneOS SDK; download 16.5 via theos/sdks
          curl -L -o sdks.tar.xz https://github.com/theos/sdks/releases/latest/download/sdks.tar.xz || true
          if [ -f sdks.tar.xz ]; then
            mkdir -p "$THEOS/sdks"
            tar -xf sdks.tar.xz -C "$THEOS/sdks"
          fi

      - name: Build
        run: |
          make clean package FINALPACKAGE=1 ${{ matrix.scheme_env }}

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: YTLiteSkipSilence-${{ matrix.scheme }}-deb
          path: packages/*.deb
          if-no-files-found: warn

  release:
    name: Attach .deb to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect .debs
        run: |
          mkdir -p release
          find artifacts -name '*.deb' -exec cp {} release/ \;
          ls -la release/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.deb
